services:
  - type: web
    name: linknest-bot
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LINKNEST_TABLE
        value: linknest_notes
      - key: CHATTHOUGHTS_SUPABASE_URL
        sync: false
      - key: CHATTHOUGHTS_SUPABASE_KEY
        sync: false
      - key: CHATTHOUGHTS_TABLE
        value: chatthoughts_thoughts
      - key: BOT_MODE
        value: webhook
