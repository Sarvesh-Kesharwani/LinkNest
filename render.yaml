services:
  - type: web
    name: linknest-bot
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TUBEO_SUPABASE_URL
        sync: false
      - key: TUBEO_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TUBEO_SUPABASE_SAVED_VIDEOS_TABLE
        value: tubeo_saved_videos
      - key: TUBEO_TELEGRAM_OWNER_EMAIL
        sync: false
      - key: TUBEO_TELEGRAM_OWNER_NAME
        sync: false
      - key: BOT_MODE
        value: webhook
