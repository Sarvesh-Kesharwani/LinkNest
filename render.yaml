services:
  - type: web
    name: linknest-bot
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: LINKNEST_TABLE
        value: linknest_notes
      - key: LEGACY_LINKS_TABLE
        value: saved_links
      - key: LINKNEST_CONVERSATION_TABLE
        value: linknest_conversations
      - key: LEGACY_ARCHIVE_FETCH_LIMIT
        value: 200
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: CHATTHOUGHTS_SUPABASE_URL
        sync: false
      - key: CHATTHOUGHTS_SUPABASE_KEY
        sync: false
      - key: CHATTHOUGHTS_TABLE
        value: chatthoughts_thoughts
      - key: TUBEO_API_URL
        sync: false
      - key: TUBEO_TELEGRAM_INGEST_SECRET
        sync: false
      - key: TUBEO_ALLOWED_TELEGRAM_USER_IDS
        sync: false
      - key: BOT_MODE
        value: webhook
